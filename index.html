<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Crown Cards — Video Director</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gdim:rgba(201,168,76,0.15);--bg:#0A0A0F;--sur:#16161F;--sur2:#1E1E2A;--brd:rgba(255,255,255,0.08);--brd2:rgba(201,168,76,0.28);--txt:#E8E6F0;--mut:#6B6880;--hot:#E05252;--teal:#2EBD9B;--purple:#8B7EC8;--rad:8px;--rad2:12px}
html,body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:24px 20px 80px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--brd)}
.crown{width:22px;height:22px;background:var(--gold);clip-path:polygon(0% 100%,0% 48%,22% 62%,50% 0%,78% 62%,100% 48%,100% 100%);flex-shrink:0}
.htitle{font-size:15px;font-weight:600}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rad2);padding:18px;margin-bottom:14px}
.card-gold{border-color:var(--brd2);background:rgba(201,168,76,0.03)}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:10px;font-weight:500}
input[type=password],input[type=text]{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rad);color:var(--txt);font-family:inherit;font-size:13px;padding:8px 12px;width:100%;outline:none;transition:border-color 0.15s}
input[type=password]:focus,input[type=text]:focus{border-color:rgba(201,168,76,0.4)}
input[type=checkbox]{accent-color:var(--gold);width:auto}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--rad);border:1px solid var(--brd);background:transparent;color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--sur2)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-p{background:var(--gold);border-color:var(--gold);color:#0A0A0F;font-weight:700}
.btn-p:hover{background:#d4a830}
.btn-sm{padding:5px 9px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;font-family:monospace}
.bg{background:var(--gdim);color:var(--gold);border:1px solid var(--brd2)}
.bt{background:rgba(46,189,155,0.1);color:var(--teal);border:1px solid rgba(46,189,155,0.25)}
.bh{background:rgba(224,82,82,0.1);color:var(--hot);border:1px solid rgba(224,82,82,0.25)}
.bm{background:var(--sur2);color:var(--mut);border:1px solid var(--brd)}
.bp{background:rgba(139,126,200,0.1);color:var(--purple);border:1px solid rgba(139,126,200,0.25)}
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 12px;border-radius:var(--rad);border:1px solid var(--brd);background:transparent;color:var(--mut);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
.tab.on{background:var(--gdim);border-color:var(--brd2);color:var(--gold)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.scard{background:var(--sur2);border-radius:var(--rad);padding:10px;text-align:center}
.snum{font-size:20px;font-weight:700;color:var(--gold)}
.slbl{font-size:10px;color:var(--mut);margin-top:2px}
.pbar{height:3px;background:var(--brd);border-radius:2px;overflow:hidden;margin:8px 0}
.pfill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s}
.sc{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rad);padding:12px;margin-bottom:7px;transition:border-color 0.2s}
.sc.done{border-color:rgba(46,189,155,0.3)}
.sc.error{border-color:rgba(224,82,82,0.3)}
.sc.generating{border-color:rgba(201,168,76,0.3)}
.logbox{background:var(--sur2);border:1px solid var(--brd);border-radius:var(--rad);padding:10px;max-height:100px;overflow-y:auto;font-family:monospace;font-size:11px;color:var(--mut);margin-top:12px}
.logbox div{margin-bottom:3px;line-height:1.4}
.logbox span{color:var(--gold);margin-right:6px}
.errbox{background:rgba(224,82,82,0.07);border:1px solid rgba(224,82,82,0.28);border-radius:var(--rad);padding:11px;color:var(--hot);font-size:12px;margin-top:12px;line-height:1.5;word-break:break-word}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.vprev{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:var(--sur2);border-radius:6px;border:1px solid var(--brd);font-size:12px}
.vnum{font-family:monospace;color:var(--gold);font-size:11px}
.note{font-size:11px;color:var(--mut);line-height:1.6;margin-top:6px}
.rgrid{display:grid;grid-template-columns:150px 1fr;gap:14px;margin-bottom:14px}
.vp{background:#000;border-radius:var(--rad2);aspect-ratio:9/16;max-height:300px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);overflow:hidden}
.vp video{width:100%;height:100%;object-fit:cover}
.noclip{color:var(--mut);font-size:12px;text-align:center;padding:20px}
.snav{padding:7px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--sur2);cursor:pointer;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s}
.snav.on{border-color:var(--brd2);background:var(--gdim)}
.promptbox{font-size:11px;color:var(--mut);background:rgba(0,0,0,0.2);padding:5px 8px;border-radius:5px;line-height:1.5;margin-bottom:4px}
.audiobox{font-size:11px;color:var(--mut)}
.dllink{font-size:11px;color:var(--teal);text-decoration:none}
.dllink:hover{text-decoration:underline}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--gdim);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.rgrid{grid-template-columns:1fr}.vgrid{grid-template-columns:1fr}}

const MODEL='veo-3.1-fast-generate-preview';
const PROXY='https://www.crowncardsfn.com/api/veo-proxy';

    {id:2,duration:3,label:'One player pops off',videoPrompt:'One gamer breaks from the pack — extraordinary play on screen, jumps up, turns to camera with pure disbelief. Teammates visible reacting on other screens. Authentic hype energy, handheld camera feel, warm lighting contrast to cold setups, 9:16.',audioNote:'Explosive crowd noise, teammates shouting muffled, music cut'},
    {id:3,duration:3,label:'Card materialises',videoPrompt:'Black void. Golden particle streams spiral inward forming a holographic trading card. The card rotates slowly, foil surface catching prismatic light, gamer face on the front, stats printed clean. Full-screen 9:16, particles scatter on reveal, card glows with inner light.',audioNote:'Crystalline shimmer sound, deep reverb impact on full reveal'},
    {id:4,duration:3,label:'Screenshot then send',videoPrompt:'Close-up of phone screen. Crown Cards profile showing holographic card. Finger taps share. WhatsApp opens. Group chat selected. Message sent. Delivered ticks appear. All in one fluid motion, dark room, phone screen the only light source. 9:16, intimate and immediate.',audioNote:'Screenshot sound, keyboard tap, WhatsApp send whoosh'},
    {id:5,duration:3,label:'Group erupts',videoPrompt:'Rapid fire cuts of three different friends seeing the card notification on their own phones. Each reacts differently: one goes silent, one types furiously, one physically leans back. Their screens show cascade of skull emojis, fires, eyes. Real rooms, authentic reaction. 9:16.',audioNote:'Notification pings, rapid typing, ambient chaos, laughter'},
    {id:6,duration:3,label:'Crown logo',videoPrompt:'Pure black screen. Crown Cards logo drops from above with physical weight, landing with a subtle shockwave ripple. Gold crown gleams with holographic surface. URL fades in below in clean white type. Single lingering shimmer. Vertical 9:16, minimal, premium, final.',audioNote:'Single deep impact thud, silence, faint shimmer ring out'}

async function generateAndPollVideo(apiKey, prompt, audioNote, genAudio, onLog) {
  const fullPrompt = genAudio && audioNote ? `${prompt}\n\nAudio direction: ${audioNote}` : prompt;

  // POST via Crown Cards proxy — avoids CORS
  const genRes = await fetch(PROXY, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      apiKey, model: MODEL, prompt: fullPrompt,
      config: { aspectRatio:'9:16', numberOfVideos:1, durationSeconds:4, personGeneration:'allow_all', generateAudio: genAudio }
    })
  });

  if (!genRes.ok) {
    const e = await genRes.json().catch(()=>({}));
    throw new Error(e?.error?.message || e?.error || `HTTP ${genRes.status}`);
  }

  const op = await genRes.json();
  if (op.error) throw new Error(op.error.message || JSON.stringify(op.error));
  if (!op.name) throw new Error('No operation name: ' + JSON.stringify(op).slice(0,300));
  onLog(`Queued — polling...`);

  // Poll via proxy — no apiKey needed, server uses env var
  for (let i = 0; i < 72; i++) {
    await new Promise(r => setTimeout(r, 8000));
    const pollRes = await fetch(`${PROXY}?action=poll&opName=${encodeURIComponent(op.name)}`);
    if (!pollRes.ok) throw new Error(`Poll HTTP ${pollRes.status}`);
    const st = await pollRes.json();
    if (st.error) throw new Error(st.error.message || JSON.stringify(st.error));
    if (st.done) {
      // predictLongRunning wraps result in generateVideoResponse.generatedSamples
      const samples = st.response?.generateVideoResponse?.generatedSamples
        || st.response?.generatedSamples
        || st.response?.generatedVideos;
      if (!samples?.length) throw new Error('No samples: ' + JSON.stringify(st.response).slice(0,300));
      const vid = samples[0].video || samples[0];
      if (vid?.bytesBase64Encoded) return `data:video/mp4;base64,${vid.bytesBase64Encoded}`;
      if (vid?.uri) {
        const dlRes = await fetch(`${PROXY}?action=download&uri=${encodeURIComponent(vid.uri)}`);
        if (!dlRes.ok) throw new Error(`Download HTTP ${dlRes.status}`);
        const blob = await dlRes.blob();
        return URL.createObjectURL(blob);
      }
      throw new Error('No video data: ' + JSON.stringify(samples[0]).slice(0,300));
    }
    if (i % 4 === 0) onLog(`Still rendering... ${(i+1)*8}s elapsed`);
  }
  throw new Error('Timed out after 9 minutes');
}

function App(){
  const [genAudio,setGenAudio]=useState(true);
  const [activeV,setActiveV]=useState(0);
  const [status,setStatus]=useState({});
  const [clips,setClips]=useState({});
  const [log,setLog]=useState([]);
  const [err,setErr]=useState('');
  const [previewS,setPreviewS]=useState(0);
  const [generating,setGenerating]=useState(false);

  const sk=(v,s)=>`${v}-${s}`;
  const getSt=(v,s)=>status[sk(v,s)]||'idle';
  const getClip=(v,s)=>clips[sk(v,s)];
  const doneV=vId=>VARS.find(v=>v.id===vId).scenes.filter(s=>getSt(vId,s.id)==='done').length;
  const totalDone=VARS.reduce((a,v)=>a+doneV(v.id),0);
  const totalAll=VARS.length*6;
  const pct=Math.round((totalDone/totalAll)*100);
  const ts=()=>new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const addLog=msg=>setLog(p=>[...p.slice(-30),{t:ts(),msg}]);

  const genScene=useCallback(async(vId,sId,prompt,audioNote)=>{
    const key=sk(vId,sId);
    setStatus(p=>({...p,[key]:'generating'}));
    setErr('');
    addLog(`Starting V${vId}S${sId}...`);
    try{
      const url = await generateAndPollVideo(CLIENT_API_KEY, prompt, audioNote, genAudio, msg=>addLog(`V${vId}S${sId}: ${msg}`));
      setClips(p=>({...p,[key]:url}));
      setStatus(p=>({...p,[key]:'done'}));
      addLog(`V${vId}S${sId} done`);
    }catch(e){
      setStatus(p=>({...p,[key]:'error'}));
      setErr(`V${vId}S${sId}: ${e.message}`);
      addLog(`ERROR V${vId}S${sId}: ${e.message}`);
    }
  },[genAudio]);

  const genVariation=async vi=>{
    setGenerating(true);
    for(const s of VARS[vi].scenes)await genScene(VARS[vi].id,s.id,s.videoPrompt,s.audioNote);
    addLog(`"${VARS[vi].name}" done`);
    setGenerating(false);
  };

  const genAll=async()=>{
    setGenerating(true);
    for(const v of VARS){for(const s of v.scenes)await genScene(v.id,s.id,s.videoPrompt,s.audioNote);addLog(`"${v.name}" done`);}
    addLog('All 5 done');setGenerating(false);
  };

  const v=VARS[activeV];

  return h('div',null,
    generating&&h('div',{className:'card card-gold',style:{marginBottom:14}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:5}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,fontSize:13,fontWeight:500}},h('span',{className:'spin'}),'Rendering '+totalDone+'/'+totalAll+' clips...'),
        h('span',{className:'badge bg'},pct+'%')
      ),
      h('div',{className:'pbar'},h('div',{className:'pfill',style:{width:pct+'%'}})),
      h('div',{className:'note'},'Each clip ~60–120s. Keep this tab open.')
    ),
    h('div',{className:'stats'},
      [{n:VARS.length,l:'Variations'},{n:6,l:'Scenes each'},{n:'18s',l:'Duration'},{n:totalDone,l:'Clips done'}].map((s,i)=>
        h('div',{key:i,className:'scard'},h('div',{className:'snum'},s.n),h('div',{className:'slbl'},s.l))
      )
    ),
    h('div',{className:'tabs'},
      VARS.map((vr,i)=>h('button',{key:i,className:'tab'+(activeV===i?' on':''),onClick:()=>{setActiveV(i);setPreviewS(0)}},
        vr.name,doneV(vr.id)>0&&h('span',{className:'badge bt',style:{marginLeft:6,fontSize:9}},doneV(vr.id)+'/6')
      ))
    ),
    h('div',{className:'card',style:{marginBottom:12}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
        h('div',null,
          h('div',{style:{fontSize:15,fontWeight:600,marginBottom:3}},'V'+(activeV+1)+': '+v.name),
          h('div',{style:{fontSize:12,color:'var(--mut)'}},v.hook),
          h('div',{style:{fontSize:11,color:'var(--mut)',marginTop:3}},h('span',{style:{color:'rgba(201,168,76,0.7)',marginRight:4}},'♪'),v.musicNote)
        ),
        h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',justifyContent:'flex-end'}},
          h('span',{className:'badge bm'},v.game),
          h('button',{className:'btn btn-sm btn-p',onClick:()=>genVariation(activeV),disabled:generating},'Generate V'+(activeV+1)),
          !generating&&totalDone===0&&h('button',{className:'btn btn-sm btn-p',onClick:genAll},'Generate all 5')
        )
      )
    ),
    totalDone>0&&h('div',{className:'rgrid'},
      h('div',null,
        h('div',{className:'vp'},
          getClip(v.id,v.scenes[previewS]?.id)
            ?h('video',{src:getClip(v.id,v.scenes[previewS].id),controls:true,key:getClip(v.id,v.scenes[previewS].id),style:{width:'100%',height:'100%',objectFit:'cover'}})
            :h('div',{className:'noclip'},'No clip yet')
        )
      ),
      h('div',null,
        v.scenes.map((s,i)=>h('div',{key:i,className:'snav'+(previewS===i?' on':''),onClick:()=>setPreviewS(i)},
          h('span',{style:{fontSize:12,color:previewS===i?'var(--gold)':'var(--txt)'}},'S'+s.id+' · '+s.label),
          h('span',{className:'badge '+(getSt(v.id,s.id)==='done'?'bt':getSt(v.id,s.id)==='error'?'bh':'bm'),style:{fontSize:9}},getSt(v.id,s.id))
        )),
        getClip(v.id,v.scenes[previewS]?.id)&&h('a',{href:getClip(v.id,v.scenes[previewS].id),download:`crown-v${activeV+1}-s${previewS+1}.mp4`,className:'dllink',style:{marginTop:8,display:'block'}},'Download clip ↓')
      )
    ),
    v.scenes.map((s,i)=>{
      const st=getSt(v.id,s.id);const clip=getClip(v.id,s.id);
      return h('div',{key:i,className:'sc'+(st==='done'?' done':st==='error'?' error':st==='generating'?' generating':'')},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{style:{fontFamily:'monospace',fontSize:11,color:'var(--gold)'}},'S'+s.id),
            h('span',{style:{fontSize:13,fontWeight:500}},s.label),
            h('span',{className:'badge bm',style:{fontSize:9}},s.duration+'s')
          ),
          h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
            st==='idle'&&h('span',{className:'badge bm'},'idle'),
            st==='generating'&&h('span',{style:{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,color:'var(--gold)'}},h('span',{className:'spin'}),'rendering'),
            st==='done'&&h('span',{className:'badge bt'},'done'),
            st==='error'&&h('span',{className:'badge bh'},'error'),
            st!=='generating'&&h('button',{className:'btn btn-sm',onClick:()=>genScene(v.id,s.id,s.videoPrompt,s.audioNote),disabled:generating},st==='done'?'re-gen':'gen')
          )
        ),
        h('div',{className:'promptbox'},h('span',{style:{color:'var(--gold)',marginRight:4}},'►'),s.videoPrompt.slice(0,140)+(s.videoPrompt.length>140?'…':'')),
        h('div',{className:'audiobox'},h('span',{style:{color:'rgba(46,189,155,0.6)',marginRight:4}},'♪'),s.audioNote),
        clip&&h('div',{style:{marginTop:6,display:'flex',gap:12}},
          h('a',{href:clip,target:'_blank',className:'dllink'},'View ↗'),
          h('a',{href:clip,download:`crown-v${v.id}-s${s.id}.mp4`,className:'dllink',style:{color:'var(--mut)'}},'Download ↓')
        )
      );
    }),
    log.length>0&&h('div',{className:'logbox'},log.slice(-12).map((l,i)=>h('div',{key:i},h('span',null,l.t),l.msg))),
    err&&h('div',{className:'errbox'},err)
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
